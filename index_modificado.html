<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>PocilgAPP</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f3f3f3;
    padding: 16px;
    margin: 0;
  }
  h1, h2 {
    margin-top: 0;
  }
  .topbar, .controls {
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    margin-bottom: 12px;
    align-items: center;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .topbar::-webkit-scrollbar, .controls::-webkit-scrollbar {
    display: none;
  }

  .app-logo-wrap {
    margin-bottom: 14px;
  }
  .logo-container {
    display: flex;
    align-items: center;
    gap: 10;
    margin-bottom: 14px;
  }

  

  .app-logo-pro {
    margin: 0;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.02em;
    display: flex;
    gap: 10;
    align-items: baseline;
  }

  .logo-main-pro {
    color: #111827;
  }

  .logo-accent-pro {
    background: linear-gradient(90deg, #22c55e, #4ade80);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 900;
  }
  .app-logo-sub {
    margin-top: 4px;
    font-size: 12px;
    color: #6b7280;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .round-add-btn {
    width: 48px;
    height: 48px;
    border-radius: 999px;
    font-size: 30px;
    box-shadow: 0 6px 16px rgba(17,24,39,0.18);
  }

  .topbar {
    justify-content: space-between;
  }

  .theme-toggle-btn {
    position: fixed;
    top: 10px;
    right: 46px;

    margin-left: auto;
    margin-right: 0;
    padding: 0;
    width: 28px;
    height: 28px;
    min-width: 28px;
    min-height: 28px;
    border-radius: 999px;
    font-size: 13px;
    line-height: 1;
    color: #6b7280;
    background: #fafafa;
    border: 1px solid #e5e7eb;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
  }
  .theme-toggle-btn:hover {
    background: #f3f4f6;
  }
  .add-icon-btn {
    width: 46px;
    height: 46px;
    border-radius: 14px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    line-height: 1;
    background: #111827;
    color: white;
    border: 1px solid #111827;
    flex: 0 0 auto;
  }
  .add-icon-btn:hover {
    background: #222;
  }
  .tiny-reset-btn {
    margin-left: auto;
    padding: 4px 8px;
    font-size: 11px;
    border-radius: 999px;
    color: #666;
    background: #fafafa;
    border: 1px solid #e5e7eb;
    flex: 0 0 auto;
  }
  .tiny-reset-btn:hover {
    background: #f3f4f6;
  }
  .card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transition: background-color 0.25s ease, box-shadow 0.25s ease, transform 0.15s ease;
  }
  .card.just-cleaned {
    background: #eefbea;
    box-shadow: 0 0 0 1px rgba(34,197,94,0.15), 0 3px 10px rgba(34,197,94,0.12);
  }
  .bar {
    height: 20px;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    margin-top: 8px;
  }
  .fill {
    height: 100%;
  }
  .red {
    background: red !important;
    animation: blink 1s infinite;
  }
  .over {
    height: 6px;
    background: black;
    position: absolute;
    top: 0;
    left: 0;
  }
  @keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
  }
  @keyframes spongeShake {
    0% { transform: translateX(0) rotate(0deg) scale(1); }
    12% { transform: translateX(-3px) rotate(-12deg) scale(1.1); }
    24% { transform: translateX(3px) rotate(12deg) scale(1.1); }
    36% { transform: translateX(-3px) rotate(-10deg) scale(1.08); }
    48% { transform: translateX(3px) rotate(10deg) scale(1.08); }
    60% { transform: translateX(-2px) rotate(-8deg) scale(1.05); }
    72% { transform: translateX(2px) rotate(8deg) scale(1.05); }
    100% { transform: translateX(0) rotate(0deg) scale(1); }
  }
  @keyframes cardNudge {
    0% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    50% { transform: translateX(2px); }
    75% { transform: translateX(-1px); }
    100% { transform: translateX(0); }
  }
  .icon-btn.sponge-animate {
    animation: spongeShake 0.65s ease;
  }
  .card.sponge-hit {
    animation: cardNudge 0.4s ease;
  }

  button, input {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: white;
    font-size: 14px;
    box-sizing: border-box;
  }
  button {
    cursor: pointer;
  }
  button:hover {
    background: #f7f7f7;
  }
  .primary {
    background: black;
    color: white;
    border-color: black;
  }
  .primary:hover {
    background: #222;
  }
  .danger {
    border-color: #f3b4b4;
    color: #b00020;
    background: #fff6f6;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: inline-block;
    margin: 0 auto 4px auto;
  }
  .summary-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
  }
  .summary-right {
    text-align: right;
    min-width: 120px;
  }
  .summary-percent {
    font-size: 28px;
    font-weight: bold;
    line-height: 1;
  }
  .summary-subtext {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }
  .summary-item {
    width: 82px;
    text-align: center;
    font-size: 11px;
    color: #444;
    line-height: 1.2;
  }
  .summary-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 12px;
  }
  .meta {
    color: #555;
    font-size: 14px;
    margin-top: 4px;
  }
  .actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
  }
  .action-left {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .action-right {
    margin-left: auto;
  }
  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    border: 1px solid #d1d5db;
    background: white;
    will-change: transform;
  }
  .icon-btn.primary-icon {
    background: #16a34a;
    color: white;
    border-color: #16a34a;
  }
  .icon-btn.primary-icon:hover {
    background: #15803d;
  }
  .icon-btn.clean-big {
    width: 74px;
    font-size: 22px;
  }
  .icon-btn.danger-icon {
    background: #fff6f6;
    color: #b00020;
    border-color: #f3b4b4;
  }
  #summary {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .empty {
    color: #666;
    background: white;
    padding: 18px;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 1000;
  }
  .modal-backdrop.open {
    display: flex;
  }
  .modal {
    width: 100%;
    max-width: 460px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    padding: 18px;
  }
  .modal h3 {
    margin-top: 0;
    margin-bottom: 14px;
  }
  .form-grid {
    display: grid;
    gap: 12px;
  }
  .field label {
    display: block;
    font-size: 13px;
    color: #444;
    margin-bottom: 5px;
  }
  .field input {
    width: 100%;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .mini-group {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 0 0 auto;
    position: relative;
  }
  .mini-icon {
    width: 28px;
    height: 28px;
    border-radius: 999px;
    border: 1px solid #d1d5db;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex: 0 0 auto;
    padding: 0;
  }
  .sort-current, .filter-current {
    border: 1px solid #d1d5db;
    background: white;
    color: #333;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 12px;
    line-height: 1;
    white-space: nowrap;
  }

  .popup-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    z-index: 1500;
  }
  .popup-backdrop.open {
    display: flex;
  }
  .popup-card {
    width: min(320px, 100%);
    background: white;
    border-radius: 18px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.22);
    padding: 14px;
  }
  .popup-title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 10px;
  }
  .popup-options {
    display: grid;
    gap: 8px;
  }
  .popup-option {
    width: 100%;
    text-align: left;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    background: white;
    font-size: 14px;
  }
  .popup-option.current {
    background: #111827;
    color: white;
    border-color: #111827;
  }

  .bubble-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 2500;
  }
  .bubble {
    position: absolute;
    bottom: -40px;
    border-radius: 999px;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(255,255,255,0.55) 45%, rgba(34,197,94,0.22) 100%);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 4px 14px rgba(34,197,94,0.18);
    animation: bubbleRise 1s ease-out forwards;
  }
  @keyframes bubbleRise {
    0% { transform: translateY(0) scale(0.7); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(-55vh) scale(1.15); opacity: 0; }
  }


  
  .sparkle-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 3000;
  }
  .sparkle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 10px rgba(34,197,94,0.6);
    animation: sparklePop 0.8s ease-out forwards;
  }
  @keyframes sparklePop {
    0% { transform: scale(0.3); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: translateY(-40px) scale(1.4); opacity: 0; }
  }

    20% { opacity: 1; }
    100% { transform: translateY(-30px) scale(1.25) rotate(45deg); opacity: 0; }
  }


  @media (prefers-color-scheme: dark) {
    body {
      background: #1f2937;
    }
    .logo-main-pro {
      color: #ffffff;
    }
    .app-logo-sub {
      color: #f3f4f6;
    }
  }


body.dark-mode {
  background: #1f2937;
}
body.dark-mode .logo-main-pro {
  color: #ffffff;
}
body.dark-mode .app-logo-sub {

}

  background: #ffffff;

  .summary-columns {

  .summary-task-item {

  }

  }


  .task-header {

  }

  .task-room-badge {

  .meta-label {

  .state-good { color: #16a34a; }

  @keyframes poopShake {
    0% { transform: translateX(0); }

  }
  .poop-shake-once {
    display: inline-block;

  }


  .critical-banner {

<body>

<div class="app-logo-wrap">
  <div class="logo-container">
  <img src="logo.png" alt="Logo" class="header-logo-img">
    <h1 class="app-logo-pro"><span class="logo-main-pro">POCILG</span><span class="logo-accent-pro">APP</span></h1>
</div>
  <div class="app-logo-sub">control de limpieza doméstica</div>
</div>

<div class="topbar">
  <button id="themeToggle" class="theme-toggle-btn" title="Cambiar modo"></button>
  <button id="viewToggle" class="view-toggle-btn" title="Cambiar vista">📊</button>
  <button id="settingsToggle" class="settings-toggle-btn" title="Ajustes">⚙️</button>
  <button class="add-icon-btn round-add-btn" onclick="openAddModal()" title="Añadir tarea">＋</button>
  <button class="tiny-reset-btn" onclick="resetAllLastDates()" title="Borrar fechas guardadas">Borrar fechas</button>
</div>

<div class="controls">
  <div class="mini-group" id="sortGroup">
    <button type="button" id="sortToggle" class="mini-icon" title="Ordenar">↕️</button>
    <div id="sortCurrent" class="sort-current"></div>
  </div>
  <div class="mini-group" id="filterGroup">
    <button type="button" id="filterToggle" class="mini-icon" title="Filtrar">🔎</button>
    <div id="filterCurrent" class="filter-current"></div><button id="filterAllQuick" class="filter-current" onclick="setFilter('all')">Todas</button>
  </div>
</div>

<div id="tasksView">
<div id="critical"></div>
<div id="summary"></div>
<div id="tasks"></div>
</div>

<div id="statsView" class="hidden-view">
  <div class="card">
    <div class="task-title">Diferencia de puntos</div>
    <div id="balanceHeadline" class="stat-big">0</div>
    <div id="balanceSubtext" class="meta">Todavía no hay diferencia.</div>
    <div class="balance-wrap">
      <div class="balance-center"></div>
      <div id="balanceLeft" class="balance-left" style="width:0%;"></div>

<script>
const STORAGE_KEY = "limpieza_casa_app_v14";
const SORT_KEY = "limpieza_casa_sort_v14";
const FILTER_KEY = "limpieza_casa_filter_v14";
const HOME_KEY = "pocilg_home_code_v1";
const USER_KEY = "pocilg_user_name_v1";
const VIEW_KEY = "pocilg_current_view_v1";
const CLEAN_HIGHLIGHT_MS = 24 * 60 * 60 * 1000;

const defaultTasks = [
  {id: crypto.randomUUID(), name:"Arenero gato", room:"Mascotas", days:15, last:null},
  {id: crypto.randomUUID(), name:"Lavabo", room:"Baño", days:21, last:null},
  {id: crypto.randomUUID(), name:"Sábanas", room:"Dormitorio", days:30, last:null},
  {id: crypto.randomUUID(), name:"Ducha", room:"Baño", days:60, last:null},
  {id: crypto.randomUUID(), name:"Muebles", room:"Salón", days:30, last:null},
  {id: crypto.randomUUID(), name:"Suelo", room:"General", days:30, last:null},
  {id: crypto.randomUUID(), name:"Aspirar", room:"General", days:2, last:null}
];

const sortOptions = [
  { value: "urgency", label: "Urgencia" },
  { value: "room", label: "Estancia" },
  { value: "name", label: "Nombre" },
  { value: "frequency", label: "Frecuencia" }
];

let tasks = [];
let currentSort = loadSort();
let currentFilter = loadFilter();
let editingTaskId = null;
let animatedTaskId = null;
let frozenOrderIds = null;
let historyEvents = [];
let homeCode = localStorage.getItem(HOME_KEY) || "";
let currentUserName = localStorage.getItem(USER_KEY) || "";
let currentView = localStorage.getItem(VIEW_KEY) || "tasks";
let selectedDifficulty = 1;

function loadTasks() {
  return [];
}

function saveTasks() {
  if (!homeCode) return;
  db.ref(getHomePath("tasks")).set(tasks);
}

function loadSort() {
  return localStorage.getItem(SORT_KEY) || "urgency";
}

function saveSort() {
  localStorage.setItem(SORT_KEY, currentSort);
}

function loadFilter() {
  return localStorage.getItem(FILTER_KEY) || "all";
}

function saveFilter() {
  localStorage.setItem(FILTER_KEY, currentFilter);
}

function sanitizeHomeCode(code) {
  return String(code || "").trim().replace(/[.#$\[\]/]/g, "_").replace(/\s+/g, "-");
}

function getHomePath(section) {
  return `homes/${sanitizeHomeCode(homeCode)}/${section}`;
}

function difficultyIcons(level) {
  return "🧹".repeat(level);
}

function renderDifficultyPicker() {
  const picker = document.getElementById("difficultyPicker");
  if (!picker) return;
  picker.innerHTML = [1,2,3,4,5].map(level => `
    <button type="button" class="difficulty-btn ${selectedDifficulty >= level ? "active" : ""}" data-difficulty="${level}" title="Dificultad ${level}">
      🧹
    </button>
  `).join("");
}

document.addEventListener("click", function(e) {
  const btn = e.target.closest("[data-difficulty]");
  if (!btn) return;
  selectedDifficulty = Number(btn.dataset.difficulty);
  renderDifficultyPicker();
});

function pointsForTask(task) {
  const difficulty = Number(task.difficulty || 1);
  return difficulty;
}

function startRealtimeSync() {
  if (!homeCode) return;

  db.ref(getHomePath("tasks")).off();
  db.ref(getHomePath("history")).off();

  db.ref(getHomePath("tasks")).on("value", (snapshot) => {
    const data = snapshot.val();
    if (data && Array.isArray(data) && data.length) {
      tasks = data;
    } else if (data && !Array.isArray(data)) {
      tasks = Object.values(data);
    } else {
      tasks = defaultTasks.map(t => ({difficulty: 1, ...t}));
      db.ref(getHomePath("tasks")).set(tasks);
    }
    frozenOrderIds = null;
    render();
  });

  db.ref(getHomePath("history")).on("value", (snapshot) => {
    const data = snapshot.val();
    historyEvents = data ? Object.values(data) : [];
    renderStats();
  });
}

function openSetup() {
  document.getElementById("homeCodeInput").value = homeCode;
  document.getElementById("userNameInput").value = currentUserName;
  document.getElementById("setupBackdrop").classList.add("open");
}

function closeSetup() {
  document.getElementById("setupBackdrop").classList.remove("open");
}

function updateViewUI() {
  const tasksView = document.getElementById("tasksView");
  const statsView = document.getElementById("statsView");
  const btn = document.getElementById("viewToggle");
  if (currentView === "stats") {
    tasksView.classList.add("hidden-view");
    statsView.classList.remove("hidden-view");
    btn.textContent = "🧽";
    btn.title = "Ver tareas";
  } else {
    tasksView.classList.remove("hidden-view");
    statsView.classList.add("hidden-view");
    btn.textContent = "📊";
    btn.title = "Ver estadísticas";
  }
  localStorage.setItem(VIEW_KEY, currentView);
}

function renderStats() {
  const totalCleans = historyEvents.length;
  const totalPoints = historyEvents.reduce((sum, e) => sum + (e.points || 0), 0);
  document.getElementById("statTotalCleans").textContent = String(totalCleans);
  document.getElementById("statTotalPoints").textContent = String(totalPoints);

  const ranking = {};
  historyEvents.forEach(e => {
    const name = e.user || "Sin nombre";
    if (!ranking[name]) ranking[name] = { cleans: 0, points: 0 };
    ranking[name].cleans += 1;
    ranking[name].points += e.points || 0;
  });

  const rankingEntries = Object.entries(ranking)
    .sort((a, b) => b[1].points - a[1].points || b[1].cleans - a[1].cleans);

  const left = rankingEntries[0] || ["—", {cleans:0, points:0}];
  const right = rankingEntries[1] || ["—", {cleans:0, points:0}];
  const leftPoints = left[1].points || 0;
  const rightPoints = right[1].points || 0;
  const diff = Math.abs(leftPoints - rightPoints);

  document.getElementById("balanceHeadline").textContent = `${diff} pts`;
  if (rankingEntries.length >= 2) {
    const winner = leftPoints === rightPoints ? "Empate" : (leftPoints > rightPoints ? left[0] : right[0]);
    document.getElementById("balanceSubtext").textContent = winner === "Empate" ? "Vais empatados." : `${winner} va por delante.`;
  } else if (rankingEntries.length === 1) {
    document.getElementById("balanceSubtext").textContent = `${left[0]} lleva todos los puntos por ahora.`;
  } else {
    document.getElementById("balanceSubtext").textContent = "Todavía no hay puntos.";
  }

  const maxDiff = 50;
  const intensity = Math.min(diff / maxDiff, 1);

  const leftBar = document.getElementById("balanceLeft");
  const rightBar = document.getElementById("balanceRight");
  const leftLabelInside = document.getElementById("balanceInsideLeft");
  const rightLabelInside = document.getElementById("balanceInsideRight");

  leftLabelInside.textContent = left[0];
  rightLabelInside.textContent = right[0];

  const fillPercent = 8 + (42 * intensity);

  if (leftPoints === rightPoints) {
    const beige = `hsl(45, ${20 + intensity*20}%, ${82 - intensity*8}%)`;
    leftBar.style.width = "50%";
    rightBar.style.width = "50%";
    leftBar.style.background = beige;
    rightBar.style.background = beige;
  } else if (leftPoints > rightPoints) {
    leftBar.style.width = `${fillPercent}%`;
    rightBar.style.width = `${fillPercent}%`;
    leftBar.style.background = `hsl(140, ${35 + intensity*45}%, ${75 - intensity*28}%)`;
    rightBar.style.background = `hsl(0, ${35 + intensity*45}%, ${82 - intensity*24}%)`;
  } else {
    leftBar.style.width = `${fillPercent}%`;
    rightBar.style.width = `${fillPercent}%`;
    leftBar.style.background = `hsl(0, ${35 + intensity*45}%, ${82 - intensity*24}%)`;
    rightBar.style.background = `hsl(140, ${35 + intensity*45}%, ${75 - intensity*28}%)`;
  }

  document.getElementById("balanceLeftLabel").textContent = `${left[0]} · ${leftPoints} pts`;
  document.getElementById("balanceRightLabel").textContent = `${right[0]} · ${rightPoints} pts`;

  const rankingRows = rankingEntries
    .map(([name, stats], i) => `
      <div class="rank-row" style="${i === 0 ? "border-top:none;" : ""}">
        <div><strong>${name}</strong><div class="meta">${stats.cleans} limpiezas</div></div>
        <div><strong>${stats.points}</strong> pts</div>
      </div>
    `).join("") || '<div class="meta">Todavía no hay datos.</div>';

  document.getElementById("rankingBox").innerHTML = rankingRows;

  const historyRows = [...historyEvents]
    .sort((a, b) => (b.at || 0) - (a.at || 0))
    .slice(0, 20)
    .map((e, i) => `
      <div class="rank-row" style="${i === 0 ? "border-top:none;" : ""}">
        <div><strong>${e.user || "Sin nombre"}</strong> limpió <strong>${e.taskName || "Tarea"}</strong></div>
        <div class="meta">${new Date(e.at || Date.now()).toLocaleString("es-ES")} · ${e.points || 0} pts</div>
      </div>
    `).join("") || '<div class="meta">Todavía no hay historial.</div>';

  document.getElementById("historyBox").innerHTML = historyRows;
}

function daysSince(date){
  if(!date) return null;
  return Math.floor((Date.now() - date) / 86400000);
}

function formatDate(ts) {
  if (!ts) return "Nunca";
  return new Date(ts).toLocaleDateString("es-ES");
}

function formatDateForInput(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function parseInputDate(str) {
  if (!str) return null;
  const parsed = new Date(str + "T12:00:00");
  if (isNaN(parsed.getTime())) return null;
  return parsed.getTime();
}

function getProgressInfo(task) {
  const elapsed = task.last ? daysSince(task.last) : task.days;
  const progress = Math.min(elapsed / task.days, 1);
  const overdue = Math.max(elapsed - task.days, 0);
  const urgencyScore = task.days === 0 ? 0 : elapsed / task.days;
  return { elapsed, progress, overdue, urgencyScore };
}

function progressToColor(progress) {
  const capped = Math.max(0, Math.min(progress, 1));
  const hue = 120 - (120 * capped);
  return `hsl(${hue}, 85%, 48%)`;
}

function getCleanlinessPercent(task) {
  const { progress } = getProgressInfo(task);
  return Math.max(0, Math.min(100, Math.round((1 - progress) * 100)));
}

function getHouseCleanPercent(taskList) {
  if (!taskList.length) return 0;
  const total = taskList.reduce((sum, task) => sum + getCleanlinessPercent(task), 0);
  return Math.round(total / taskList.length);
}

function getPercentColor(percent) {
  const progress = 1 - (percent / 100);
  return progressToColor(progress);
}

function getRooms() {
  return [...new Set(tasks.map(t => t.room))].sort((a, b) => a.localeCompare(b, "es"));
}

function getSortedTasks(taskList) {
  const copied = [...taskList];

  copied.sort((a, b) => {
    if (currentSort === "name") return a.name.localeCompare(b.name, "es");
    if (currentSort === "room") {
      const roomCompare = a.room.localeCompare(b.room, "es");
      if (roomCompare !== 0) return roomCompare;
      return a.name.localeCompare(b.name, "es");
    }
    if (currentSort === "frequency") {
      if (a.days !== b.days) return a.days - b.days;
      return a.name.localeCompare(b.name, "es");
    }
    const aUrgency = getProgressInfo(a).urgencyScore;
    const bUrgency = getProgressInfo(b).urgencyScore;
    if (bUrgency !== aUrgency) return bUrgency - aUrgency;
    return a.name.localeCompare(b.name, "es");
  });

  return copied;
}

function getFilteredTasks() {
  const base = currentFilter === "all" ? tasks : tasks.filter(t => t.room === currentFilter);
  return getSortedTasks(base);
}

function getDisplayTasks() {
  const filtered = getFilteredTasks();
  if (!frozenOrderIds) return filtered;
  const orderMap = new Map(frozenOrderIds.map((id, index) => [id, index]));
  return [...filtered].sort((a, b) => {
    const ai = orderMap.has(a.id) ? orderMap.get(a.id) : Number.MAX_SAFE_INTEGER;
    const bi = orderMap.has(b.id) ? orderMap.get(b.id) : Number.MAX_SAFE_INTEGER;
    if (ai !== bi) return ai - bi;
    return 0;
  });
}

function refreshFrozenOrder() {
  frozenOrderIds = getFilteredTasks().map(t => t.id);
}

function isJustCleaned(task) {
  return !!task.last && (Date.now() - task.last < CLEAN_HIGHLIGHT_MS);
}

function renderSortControl() {
  const current = sortOptions.find(option => option.value === currentSort);
  document.getElementById("sortCurrent").textContent = current ? current.label : "Urgencia";

  const popup = document.getElementById("sortPopupOptions");
  popup.innerHTML = sortOptions.map(option => `
    <button type="button" class="popup-option ${option.value === currentSort ? "current" : ""}" data-sort="${option.value}">
      ${option.label}
    </button>
  `).join("");
}

function renderFilterControl() {
  const rooms = getRooms();
  const allOptions = [{ value: "all", label: "Todas" }, ...rooms.map(room => ({ value: room, label: room }))];
  const current = allOptions.find(option => option.value === currentFilter) || allOptions[0];
  document.getElementById("filterCurrent").textContent = current.label;

  const quickAll = document.getElementById("filterAllQuick");
  if (currentFilter === "all") {
    quickAll.style.display = "none";
  } else {
    quickAll.style.display = "inline-block";
  }

  const popup = document.getElementById("filterPopupOptions");
  popup.innerHTML = allOptions.map(option => `
    <button type="button" class="popup-option ${option.value === currentFilter ? "current" : ""}" data-filter="${escapeHtml(option.value)}">
      ${option.label}
    </button>
  `).join("");
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function render(){
  const criticalEl = document.getElementById("critical");
  const container = document.getElementById("tasks");
  const summary = document.getElementById("summary");

  renderSortControl();
  renderFilterControl();

  container.innerHTML = "";
  summary.innerHTML = "";

  if (!frozenOrderIds) refreshFrozenOrder();
  const filteredTasks = getDisplayTasks();

  const urgentTasks = filteredTasks.filter(t => getCleanlinessPercent(t) < 5);
  if (criticalEl) {
    if (urgentTasks.length > 0) {
      criticalEl.innerHTML = `<div class="critical-banner" onclick="goToCritical()">⚠️ ${urgentTasks.length} tarea(s) críticas</div>`;
    } else {
      criticalEl.innerHTML = `<div class="critical-banner good">✔️ Todo en orden</div>`;
    }
  }
  const housePercent = getHouseCleanPercent(filteredTasks);

  const grouped = {};
  filteredTasks.forEach(t => {
    if (!grouped[t.room]) grouped[t.room] = [];
    grouped[t.room].push(t);
  });

  const groupedEntries = Object.entries(grouped)
    .map(([room, roomTasks]) => {
      const pendingTasks = roomTasks.filter(task => getProgressInfo(task).elapsed >= task.days);
      const avgPendingProgress = pendingTasks.length
        ? pendingTasks.reduce((sum, task) => sum + getProgressInfo(task).progress, 0) / pendingTasks.length
        : -1;
      return { room, roomTasks, pendingTasks, pendingCount: pendingTasks.length, avgPendingProgress };
    })
    .sort((a, b) => {
      if (b.pendingCount !== a.pendingCount) return b.pendingCount - a.pendingCount;
      if (b.avgPendingProgress !== a.avgPendingProgress) return b.avgPendingProgress - a.avgPendingProgress;
      return a.room.localeCompare(b.room, "es");
    });

  let summaryHtml = `
    <div class="summary-header">
      <div><b>Resumen rápido</b></div>
      <div class="summary-right">
        <div class="summary-percent" style="color:${getPercentColor(housePercent)}">${housePercent}%</div>
        <div class="summary-subtext">limpia</div>
      </div>
    </div>
  `;

  summaryHtml += "<div class='summary-columns'>";
  groupedEntries.forEach(({ room, roomTasks, pendingTasks }) => {
    const tasksToShow = pendingTasks.length ? pendingTasks : roomTasks;
    summaryHtml += `<div class="summary-column"><div class="summary-room-title">${room}</div><div class="summary-dots">`;
    tasksToShow.forEach((t) => {
      const { progress } = getProgressInfo(t);
      const color = progressToColor(progress);
      summaryHtml += `
        <div class="summary-task-item" title="${t.name}">
          <span class="dot" style="background:${color}"></span>
          <div>${t.name}</div>
        </div>
      `;
    });
    summaryHtml += `</div></div>`;
  });
  summaryHtml += "</div>";

  const pendingByRoom = groupedEntries
    .filter(item => item.pendingCount > 0)
    .map(item => `${item.room}: ${item.pendingCount}`);

  const pendingText = pendingByRoom.length
    ? pendingByRoom.join(" · ")
    : "No hay tareas pendientes";

  summaryHtml += `<div class='meta' style='margin-top:10px'>Pendientes · ${pendingText}</div>`;
  summary.innerHTML = summaryHtml;

  if (!filteredTasks.length) {
    container.innerHTML = `<div class="empty">No hay tareas para la estancia seleccionada.</div>`;
    return;
  }

  filteredTasks.forEach((t)=>{
    const { elapsed, progress, overdue } = getProgressInfo(t);
    const realIndex = tasks.findIndex(task => task.id === t.id);
    const fillColor = progressToColor(progress);
    const justCleanedClass = isJustCleaned(t) ? "just-cleaned" : "";
    const spongeAnimClass = animatedTaskId === t.id ? "sponge-animate" : "";
    const spongeHitClass = animatedTaskId === t.id ? "sponge-hit" : "";

    const card = document.createElement("div");
    card.id = `task-${t.id}`;
    card.className = `card ${justCleanedClass} ${spongeHitClass}`;
    card.innerHTML = `
      <div class="task-header">
        <div class="task-title">${t.name}</div>
        <div class="task-room-badge">${t.room}</div>
      </div>
      <div class="meta-row"><span class="meta-icon">📅</span><span class="meta-label">Última limpieza:</span> <span class="meta-value">${formatDate(t.last)}</span></div>
      <div class="meta-row"><span class="meta-icon">⏳</span><span class="meta-label">Frecuencia:</span> <span class="meta-value">cada ${t.days} días</span></div>
      <div class="meta-row"><span class="meta-icon">🥵</span><span class="meta-label">Dificultad:</span> <span class="meta-value">${difficultyIcons(Number(t.difficulty || 1))}</span></div>
      <div class="meta" style="margin-top:8px;"><span class="meta-icon">✨</span> <span class="meta-label">Estado actual:</span> <span class="meta-value ${getCleanlinessPercent(t)>=70 ? "state-good" : getCleanlinessPercent(t)>=40 ? "state-warning" : "state-bad"}">${getCleanlinessPercent(t)>=60 ? "👌" : getCleanlinessPercent(t)>=25 ? "😐" : getCleanlinessPercent(t)>=5 ? "😢" : "<span class=\"poop-shake-once\">💩</span>"} ${getCleanlinessPercent(t)}% limpio</span></div>
      <div class="bar">
        <div class="fill ${elapsed>=t.days?'red':''}" style="width:${progress*100}%; background:${fillColor}"></div>
        ${overdue>0 ? `<div class="over" style="width:${Math.min(overdue/t.days,1)*100}%"></div>` : ""}
      </div>
      <div class="meta">
        ${elapsed >= t.days ? `Lleva ${overdue} día(s) de retraso` : `Quedan ${t.days - elapsed} día(s)`}
      </div>
      <div class="actions">
        <div class="action-left">
          <button type="button" class="icon-btn" onclick="openEditModal(${realIndex})" title="Editar">✏️</button>
          <button type="button" class="icon-btn danger-icon" onclick="deleteTask(${realIndex})" title="Borrar">🗑️</button>
        </div>
        <div class="action-right">
          <button type="button" class="icon-btn primary-icon clean-big ${spongeAnimClass}" onclick="clean(${realIndex})" title="Marcar como limpiado">🧽</button>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

function openSortPopup() {
  animatedTaskId = null;
  render();
  document.getElementById("sortPopupBackdrop").classList.add("open");
}

function closeSortPopup() {
  document.getElementById("sortPopupBackdrop").classList.remove("open");
}

function openFilterPopup() {
  animatedTaskId = null;
  render();
  document.getElementById("filterPopupBackdrop").classList.add("open");
}

function closeFilterPopup() {
  document.getElementById("filterPopupBackdrop").classList.remove("open");
}

function setSort(value) {
  currentSort = value;
  saveSort();
  refreshFrozenOrder();
  closeSortPopup();
  render();
}

function setFilter(value) {
  currentFilter = value;
  saveFilter();
  refreshFrozenOrder();
  closeFilterPopup();
  render();
}

function clean(i){
  tasks[i].last = Date.now();
  animatedTaskId = tasks[i].id;
  saveTasks();

  if (homeCode) {
    const eventRef = db.ref(getHomePath("history")).push();
    eventRef.set({
      user: currentUserName || "Sin nombre",
      taskName: tasks[i].name,
      taskId: tasks[i].id,
      points: pointsForTask(tasks[i]),
      at: Date.now()
    });
  }

  render();
  spawnCleaningBubbles();
  spawnCleaningSparkles();

  setTimeout(() => {
    animatedTaskId = null;
    render();
  }, 700);
}

function openEditModal(i) {
  const task = tasks[i];
  editingTaskId = task.id;
  document.getElementById("modalTitle").textContent = "Editar tarea";
  document.getElementById("taskName").value = task.name;
  document.getElementById("taskRoom").value = task.room;
  document.getElementById("taskDays").value = task.days;
  document.getElementById("taskLast").value = formatDateForInput(task.last);
  selectedDifficulty = Number(task.difficulty || 1);
  renderDifficultyPicker();
  document.getElementById("taskModalBackdrop").classList.add("open");
}

function openAddModal() {
  currentView = "tasks";
  updateViewUI();
  editingTaskId = null;
  document.getElementById("modalTitle").textContent = "Añadir tarea";
  document.getElementById("taskName").value = "";
  document.getElementById("taskRoom").value = "";
  document.getElementById("taskDays").value = "";
  document.getElementById("taskLast").value = "";
  selectedDifficulty = 1;
  renderDifficultyPicker();
  document.getElementById("taskModalBackdrop").classList.add("open");
}

function closeTaskModal() {
  document.getElementById("taskModalBackdrop").classList.remove("open");
}

function saveTaskFromModal() {
  const name = document.getElementById("taskName").value.trim();
  const room = document.getElementById("taskRoom").value.trim();
  const days = Number(document.getElementById("taskDays").value);
  const lastStr = document.getElementById("taskLast").value.trim();

  if (!name) return alert("Escribe un nombre.");
  if (!room) return alert("Escribe una estancia.");
  if (!days || days <= 0) return alert("La frecuencia debe ser un número mayor que 0.");

  let parsedLast = null;
  if (lastStr !== "") {
    parsedLast = parseInputDate(lastStr);
    if (parsedLast === null) return alert("La fecha no es válida.");
  }

  if (editingTaskId) {
    const index = tasks.findIndex(t => t.id === editingTaskId);
    if (index !== -1) {
      tasks[index].name = name;
      tasks[index].room = room;
      tasks[index].days = days;
      tasks[index].last = parsedLast;
      tasks[index].difficulty = selectedDifficulty;
    }
  } else {
    tasks.push({ id: crypto.randomUUID(), name, room, days, last: parsedLast, difficulty: selectedDifficulty });
  }

  saveTasks();
  refreshFrozenOrder();
  closeTaskModal();
  render();
}

function deleteTask(i) {
  if (!confirm(`¿Borrar la tarea "${tasks[i].name}"?`)) return;
  tasks.splice(i, 1);
  saveTasks();
  refreshFrozenOrder();
  render();
}

function resetAllLastDates() {
  if (!confirm("¿Seguro que quieres borrar todas las fechas guardadas?")) return;
  tasks = tasks.map(t => ({ ...t, last: null }));
  saveTasks();
  refreshFrozenOrder();
  render();
}

});
document.getElementById("sortToggle").addEventListener("click", openSortPopup);
document.getElementById("filterToggle").addEventListener("click", openFilterPopup);

  const code = document.getElementById("homeCodeInput").value.trim();

});

document.getElementById("settingsToggle").addEventListener("click", function() {
  openSetup();
});

document.getElementById("viewToggle").addEventListener("click", function() {
  currentView = currentView === "tasks" ? "stats" : "tasks";
  updateViewUI();
});

document.getElementById("resetPointsBtn").addEventListener("click", function() {
  if (!confirm("¿Seguro que quieres resetear el contador de puntos a 0?")) return;
  if (!homeCode) return;
  db.ref(getHomePath("history")).set([]);
});

if (homeCode && currentUserName) {
  startRealtimeSync();
} else {
  openSetup();
}
updateViewUI();
renderDifficultyPicker();

render();


// THEME SYSTEM
const THEME_KEY = "pocilg_theme";

function applyTheme(theme){
  const btn = document.getElementById("themeToggle");
  if(theme === "dark"){
    document.body.classList.add("dark-mode");
    if (btn) btn.textContent = "☀️";
  } else {
    document.body.classList.remove("dark-mode");
    if (btn) btn.textContent = "🌙";
  }
}

function detectSystemTheme(){
  return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
}

function initTheme(){
  const saved = localStorage.getItem(THEME_KEY);
  const theme = saved || detectSystemTheme();
  applyTheme(theme);
}

document.getElementById("themeToggle").addEventListener("click", ()=>{
  const isDark = document.body.classList.contains("dark-mode");
  const newTheme = isDark ? "light" : "dark";
  localStorage.setItem(THEME_KEY, newTheme);
  applyTheme(newTheme);
});

initTheme();


function goToCritical(){
  const tasks = document.querySelectorAll('[id^="task-"]');
  for (let el of tasks){
    const text = el.innerText;
    if (text.includes('💩')){ 
      el.scrollIntoView({behavior:'smooth', block:'center'});
      el.classList.add('highlight');
      setTimeout(()=>el.classList.remove('highlight'),1000);
      break;
    }
  }
}
